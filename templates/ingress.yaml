apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: catalogue-ingress
  annotations:
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:430774481266:certificate/348e9987-2b3f-49bc-8161-72c4a4ded5f8
    alb.ingress.kubernetes.io/scheme:  internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
  - host: "{{ .Values.ingress.host }}"
    http:
      paths:
      - pathType: Prefix
        path: "/health"
        backend:
          service:
            name: catalogue
            port:
              number: 8080

